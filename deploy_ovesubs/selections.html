function requestApproval(type, id){
  _pinTarget=id; _pinType=type;
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').textContent='';
  document.getElementById('modalPin').classList.add('open');
  setTimeout(()=>document.getElementById('pinInput').focus(),100);
}
function submitPin(){
  const entered=document.getElementById('pinInput').value;
  if(entered!==OWNER_PIN){
    document.getElementById('pinError').textContent='Incorrect PIN. Try again.';
    document.getElementById('pinInput').value='';
    return;
  }
  const now=new Date();
  const stamp=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const approval={approved:true,stamp,by:'Owner'};
  if(_pinType==='finish'){
    for(const r of DATA){const f=r.finishes.find(x=>x.id===_pinTarget);if(f){f.ownerApproval=approval;break;}}
  } else {
    const i=findItem(_pinTarget);if(i)i.ownerApproval=approval;
  }
  saveData();
  closeModal('modalPin');
  render();
  showToast('✓ Owner Approved');
}
function revokeApproval(type,id){
  if(!confirm('Revoke owner approval?'))return;
  if(type==='finish'){for(const r of DATA){const f=r.finishes.find(x=>x.id===id);if(f){delete f.ownerApproval;break;}}}
  else {const i=findItem(id);if(i)delete i.ownerApproval;}
  saveData();render();showToast('Approval revoked');
}

function renderStats(){
  const counts={};STATUS_ORDER.forEach(s=>counts[s]=0);let n=0;
  for(const r of DATA){for(const f of r.finishes){counts[f.status||'not_started']++;n++;}for(const i of r.items){counts[i.status||'not_started']++;n++;}}
  if(!n)n=1;
  document.getElementById('selStats').innerHTML=STATUS_ORDER.map(s=>`<div class="sel-stat"><div class="num ${STAT_CLASSES[s]}">${counts[s]}</div><div class="lbl">${STATUS_LABELS[s]}</div></div>`).join('');
  document.getElementById('pipelineBar').innerHTML=STATUS_ORDER.map(s=>{const p=counts[s]/n*100;return p>0?`<div class="pipeline-seg" style="width:${p}%;background:${STATUS_COLORS[s]}"></div>`:''}).join('');
}

function mkSel(id,isFinish,roomId,current,compact){
  const cls='st-'+(current||'not_started');
  const mini=compact?'style="min-width:90px;font-size:10px"':'';
  const fn=isFinish?`updateFinishStatus('${roomId}','${id}',this.value)`:`updateItemField('${id}','status',this.value)`;
  return `<select class="${cls}" ${mini} onchange="${fn};this.className='st-'+this.value">${STATUS_ORDER.map(s=>`<option value="${s}"${(current||'not_started')===s?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}</select>`;
}

  const el=document.getElementById('body');let html='';let lastLevel='';
  for(const room of DATA){
    let finishes=room.finishes,items=room.items;
    if(currentFilter!=='all'){finishes=finishes.filter(f=>(f.status||'not_started')===currentFilter);items=items.filter(i=>(i.status||'not_started')===currentFilter);}
    if(q){finishes=finishes.filter(f=>(f.type+' '+f.material+' '+f.vendor+' '+f.notes).toLowerCase().includes(q));items=items.filter(i=>(i.name+' '+i.vendor+' '+i.notes).toLowerCase().includes(q));}
    if(!finishes.length&&!items.length&&(currentFilter!=='all'||q))continue;
    if(room.level!==lastLevel){lastLevel=room.level;html+=`<div class="level-hdr">${room.level}</div>`;}
    const all=[...room.finishes,...room.items];
    const selCount=all.filter(x=>['selected','ordered','received','installed'].includes(x.status||'not_started')).length;

      const note=(item.notes||'').substring(0,70);
      const link=item.link||item.manual||'';
      html+=`<tr><td><span class="mto-room-tag">${esc(room)}</span></td><td>${typeCell}</td>
        <td><strong>${esc(name)}</strong>${link?` <a href="${link}" target="_blank" style="color:var(--blue);font-size:12px">🔗</a>`:''}${note?`<br><span style="font-size:10px;color:var(--dim)">${esc(note)}${item.notes.length>70?'…':''}</span>`:''}</td>
        <td style="font-size:11px">${esc(isFinish?(item.qty||'—'):(item.model||''))}</td>
        <td style="font-size:11px;color:var(--txt2)">${esc(isFinish?(item.vendor||'TBD'):(item.color||''))}</td>
        <td><select class="${st}" style="min-width:95px;font-size:10px" onchange="updateAnyStatus('${item.id}',this)">${STATUS_ORDER.map(s=>`<option value="${s}"${(item.status||'not_started')===s?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}</select></td>
        <td>${link?`<a href="${link}" target="_blank" style="color:var(--blue)">↗</a>`:''}</td>
      </tr>`;
    }
    html+=`</tbody></table></div></div>`;
  }
  el.innerHTML=html;
}

function updateAnyStatus(id,sel){
  sel.className='st-'+sel.value;
  for(const r of DATA){
    const f=r.finishes.find(x=>x.id===id);if(f){f.status=sel.value;saveData();showToast('✓ Saved');return;}
    const i=r.items.find(x=>x.id===id);if(i){i.status=sel.value;saveData();showToast('✓ Saved');return;}
  }
}
function updateFinish(roomId,fid,field,val){const r=findRoom(roomId);if(!r)return;const f=r.finishes.find(x=>x.id===fid);if(!f)return;f[field]=val;saveData();showToast('✓ Saved');}
function updateFinishStatus(roomId,fid,val){const r=findRoom(roomId);if(!r)return;const f=r.finishes.find(x=>x.id===fid);if(!f)return;f.status=val;saveData();showToast('✓ Saved');}
function updateItemField(id,field,val){const i=findItem(id);if(!i)return;i[field]=val;saveData();if(field==='status')render();else showToast('✓ Saved');}

function openAddFinish(roomId){_addRoomId=roomId;['mfMaterial','mfQty','mfVendor','mfLink','mfNotes'].forEach(id=>document.getElementById(id).value='');document.getElementById('mfType').selectedIndex=0;document.getElementById('modalFinish').classList.add('open');document.getElementById('mfMaterial').focus();}
function saveFinish(){
  const r=findRoom(_addRoomId);if(!r)return;
  const mat=document.getElementById('mfMaterial').value.trim();if(!mat){showToast('Material required',true);return;}
  r.finishes.push({id:uid(),type:document.getElementById('mfType').value,material:mat,qty:document.getElementById('mfQty').value.trim(),unit:'',vendor:document.getElementById('mfVendor').value.trim(),link:document.getElementById('mfLink').value.trim(),notes:document.getElementById('mfNotes').value.trim(),status:'not_started',model:'',color:'',leadTime:''});
  saveData();closeModal('modalFinish');render();showToast('✓ Added');
}
function openAddItem(roomId){_addRoomId=roomId;['miName','miVendor','miLink','miNotes'].forEach(id=>document.getElementById(id).value='');document.getElementById('modalItem').classList.add('open');document.getElementById('miName').focus();}
function saveItem(){
  const r=findRoom(_addRoomId);if(!r)return;
  const name=document.getElementById('miName').value.trim();if(!name){showToast('Name required',true);return;}
  r.items.push({id:uid(),name,vendor:document.getElementById('miVendor').value.trim(),link:document.getElementById('miLink').value.trim(),notes:document.getElementById('miNotes').value.trim(),status:'not_started',model:'',color:'',leadTime:'',photo:''});
  saveData();closeModal('modalItem');render();showToast('✓ Added');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function delFinish(roomId,fid){const r=findRoom(roomId);if(!r)return;const idx=r.finishes.findIndex(x=>x.id===fid);if(idx<0)return;if(!confirm('Remove "'+r.finishes[idx].material+'"?'))return;r.finishes.splice(idx,1);saveData();render();showToast('✓ Removed');}
function delItem(id){for(const r of DATA){const idx=r.items.findIndex(x=>x.id===id);if(idx>=0){if(!confirm('Remove "'+r.items[idx].name+'"?'))return;r.items.splice(idx,1);saveData();render();showToast('✓ Removed');return;}}}

function toggleRoom(hdr){hdr.classList.toggle('open');hdr.nextElementSibling.classList.toggle('open');}
function toggleMTO(hdr){hdr.classList.toggle('open');hdr.nextElementSibling.classList.toggle('open');}

function triggerPhoto(id,el){el.querySelector('input[type="file"]').click();}
function handlePhoto(id,input){const f=input.files[0];if(!f)return;const r2=new FileReader();r2.onload=e=>{const i=findItem(id);if(i){i.photo=e.target.result;saveData();render();}};r2.readAsDataURL(f);}
function openLB(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}

function exportSelections(){
  let csv='Level,Room,Type,Material/Item,SF/Qty,Vendor,Status,Model,Color,Lead Time,Notes\n';
  for(const r of DATA){
    for(const f of r.finishes)csv+=`"${r.level}","${r.name}","${f.type}","${(f.material||'').replace(/"/g,'""')}","${f.qty||''}","${f.vendor||''}","${STATUS_LABELS[f.status||'not_started']}","${f.model||''}","${f.color||''}","${f.leadTime||''}","${(f.notes||'').replace(/"/g,'""')}"\n`;
    for(const i of r.items)csv+=`"${r.level}","${r.name}","Item","${(i.name||'').replace(/"/g,'""')}","","${i.vendor||''}","${STATUS_LABELS[i.status||'not_started']}","${i.model||''}","${i.color||''}","${i.leadTime||''}","${(i.notes||'').replace(/"/g,'""')}"\n`;
  }
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='rodriguez_selections.csv';a.click();showToast('✓ Exported');
}

loadData();
</script>
<div class="modal-bg" id="modalPin" onclick="if(event.target===this)closeModal('modalPin')">
  <div class="pin-modal">
    <h3>🔐 Owner Approval</h3>
    <p>Enter owner PIN to approve this selection</p>
    <input class="pin-input" id="pinInput" type="password" maxlength="10" placeholder="••••" onkeydown="if(event.key==='Enter')submitPin()">
    <div class="pin-error" id="pinError"></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-dim btn-sm" onclick="closeModal('modalPin')">Cancel</button>
      <button class="btn btn-blue btn-sm" onclick="submitPin()">Approve</button>
    </div>
  </div>
</div>
</body>
</html>
