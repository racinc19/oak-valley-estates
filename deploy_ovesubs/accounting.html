<!DOCTYPE html><!-- build:20260218183733 -->
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodriguez Residence — Invoice</title>
<style>
:root{--bg:#0c1220;--card:#141e30;--card2:#1a2640;--hover:#1e2d4a;--bdr:#2a3a55;--txt:#e8edf5;--txt2:#8899b0;--dim:#5a6d85;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--cyan:#06b6d4;--purple:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{padding-top:56px;font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
.topnav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.container{max-width:1100px;margin:0 auto;padding:24px 20px}

/* toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.toolbar-left{display:flex;align-items:center;gap:12px}
.toolbar h1{font-size:20px;font-weight:800}
.refresh-note{font-size:11px;color:var(--dim)}
.toolbar-right{display:flex;gap:8px;flex-wrap:wrap}
.btn-pri{background:linear-gradient(135deg,#06b6d4,#3b82f6);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(6,182,212,.3)}
.btn-pri:hover{filter:brightness(1.1)}
.btn-sec{background:var(--card2);color:var(--txt);border:1px solid var(--bdr);padding:9px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-sec:hover{border-color:var(--blue)}

.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--bdr)}
.tab{padding:10px 20px;font-size:13px;font-weight:700;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab .cnt{background:var(--bdr);color:var(--txt2);font-size:10px;padding:1px 6px;border-radius:8px;margin-left:6px}
.tab-panel{display:none}.tab-panel.active{display:block}

.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-20px);padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:all .3s;pointer-events:none;background:var(--green);color:white}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:60px;color:var(--dim);font-size:14px}
.empty{text-align:center;color:var(--dim);padding:40px;font-size:13px}

/* ══ THE INVOICE ══ */
.invoice-wrap{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,.4)}

.inv-header{background:linear-gradient(135deg,#0c4a6e 0%,#1e3a8a 100%);padding:32px 40px;display:flex;justify-content:space-between;align-items:flex-start}
.inv-brand{display:flex;align-items:center;gap:16px}
.inv-mark{width:60px;height:60px;background:rgba(255,255,255,.15);border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;font-weight:900;letter-spacing:-1px;border:2px solid rgba(255,255,255,.2)}
.inv-company{color:white}
.inv-company .co-name{font-size:24px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
.inv-company .co-sub{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:1.2px;margin-top:4px}
.inv-company .co-info{font-size:12px;opacity:.75;margin-top:10px;line-height:1.7}
.inv-title{text-align:right;color:white}
.inv-title .word{font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1;opacity:.9}
.inv-title .num{font-size:14px;font-weight:700;opacity:.7;margin-top:6px}
.inv-title .status-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px;text-transform:uppercase;letter-spacing:.8px}
.status-current{background:rgba(6,182,212,.3);border:1px solid rgba(6,182,212,.5);color:#67e8f9}
.status-paid{background:rgba(34,197,94,.3);border:1px solid rgba(34,197,94,.5);color:#86efac}

.inv-billing{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-bottom:1px solid #e2e8f0}
.bill-col{padding:24px 32px;border-right:1px solid #e2e8f0}
.bill-col:last-child{border-right:none}
.bill-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:10px}
.bill-name{font-size:15px;font-weight:800;color:#0f172a;margin-bottom:4px}
.bill-addr{font-size:12px;color:#475569;line-height:1.7}
.detail-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f8fafc}
.detail-row:last-child{border:none}
.dk{color:#94a3b8}.dv{font-weight:700;color:#0f172a}
.due-red{color:#dc2626!important}

/* summary bar */
.inv-summary{display:grid;grid-template-columns:repeat(4,1fr);background:#f8fafc;border-bottom:1px solid #e2e8f0}
.sum-cell{padding:16px 24px;border-right:1px solid #e2e8f0;text-align:center}
.sum-cell:last-child{border-right:none}
.sum-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:4px}
.sum-val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}

/* line items */
.inv-table{width:100%;border-collapse:collapse}
.inv-table th{background:#1e3a8a;padding:11px 20px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#bae6fd}
.inv-table th.r{text-align:right}
.inv-table th.c{text-align:center}
.inv-table td{padding:11px 20px;font-size:13px;border-bottom:1px solid #f1f5f9;color:#0f172a;vertical-align:middle}
.inv-table td.r{text-align:right;font-variant-numeric:tabular-nums}
.inv-table td.c{text-align:center}
.inv-table tr.ph-row td{background:#f0f9ff;font-weight:800;color:#0891b2;font-size:12px;text-transform:uppercase;letter-spacing:.5px;padding:8px 20px;border-bottom:1px solid #e0f2fe}
.inv-table tr.it-row:nth-child(even) td{background:#fafafa}
.inv-table tr.it-row:hover td{background:#f0f9ff}
.inv-table tr.paid-row td{background:#f0fdf4;color:#166534}
.inv-table tr.paid-row td.r{color:#16a34a}
.pbar-wrap{display:flex;align-items:center;gap:6px;justify-content:center}
.pbar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;width:48px}
.pbar .fill{height:100%;background:#0891b2;border-radius:3px}
.paid-pill{display:inline-block;padding:1px 8px;background:#dcfce7;color:#166534;border-radius:10px;font-size:10px;font-weight:700;border:1px solid #86efac}

/* totals */
.inv-totals{padding:20px 32px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end}
.tot-box{min-width:300px}
.t-row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid #f1f5f9;color:#0f172a}
.t-row:last-child{border:none}
.t-row.grand{font-size:20px;font-weight:900;border-top:2px solid #0891b2;padding-top:14px;margin-top:6px;color:#0891b2}
.tk{color:#64748b}

/* remit */
.inv-remit{margin:0;border-top:1px solid #e2e8f0}
.remit-head{background:linear-gradient(135deg,#0c4a6e,#1e3a8a);padding:14px 32px;display:flex;justify-content:space-between;align-items:center}
.remit-head .rt{color:white;font-size:14px;font-weight:800}
.remit-head .rs{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}
.remit-body{padding-top:56px;display:grid;grid-template-columns:1fr 1fr;padding:24px 32px;gap:32px;background:#f0f9ff}
.rf-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#0891b2;margin-bottom:5px}
.rf-val{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:14px}
.rf-ph{color:#94a3b8;font-style:italic;font-weight:400}
.ref-val{color:#0891b2;font-weight:700}
.remit-note{padding:12px 32px;background:#dbeafe;font-size:11px;color:#1e40af;border-top:1px solid #bfdbfe;line-height:1.6}

/* footer */
.inv-footer{padding:24px 32px;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #e2e8f0;background:white}
.sig-block{border-top:1px solid #cbd5e1;padding-top:8px;min-width:220px}
.sig-lbl{font-size:11px;color:#64748b;margin-top:4px}
.foot-note{font-size:10px;color:#94a3b8;text-align:right;line-height:1.8}

/* history */
.hist-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hist-card:hover{border-color:var(--cyan)}
.hc-num{font-size:14px;font-weight:800;color:var(--cyan)}
.hc-meta{font-size:11px;color:var(--dim);margin-top:2px}
.hc-amt{font-size:20px;font-weight:800}
.hc-btns button{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;margin-left:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.b-paid{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.b-sent{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.b-del{background:none;border:1px solid var(--red)!important;color:var(--red)}

/* CO tab */
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px;color:var(--txt);font-family:inherit;font-size:13px;outline:none}
.search-bar input::placeholder{color:var(--dim)}
.upload-zone{border:2px dashed var(--bdr);border-radius:12px;padding:32px;text-align:center;cursor:pointer;background:var(--card);margin-bottom:16px}
.upload-zone:hover{border-color:var(--blue);background:var(--hover)}
.upload-zone .ico{font-size:36px;margin-bottom:8px}
.upload-zone .utxt{font-size:13px;color:var(--txt2)}
.upload-zone .utxt b{color:var(--blue)}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.doc-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px}
.doc-card:hover{border-color:var(--purple)}
.doc-type{font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.doc-name{font-size:14px;font-weight:700;margin-bottom:4px}
.doc-amt{font-size:16px;font-weight:800;margin-bottom:8px}
.doc-meta{font-size:11px;color:var(--dim);margin-bottom:8px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:24px;width:480px;max-width:90vw;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:16px}
.modal label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;margin-top:12px;text-transform:uppercase;letter-spacing:.5px}
.modal input,.modal select,.modal textarea{width:100%;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;color:var(--txt);font-family:inherit;font-size:13px;outline:none}
.modal textarea{height:60px;resize:vertical}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-btns button{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}
.btn-cancel{background:var(--bg);color:var(--txt2);border:1px solid var(--bdr)!important}
.btn-save{background:var(--blue);color:white}

@media print{
  .topnav,.toolbar,.tabs,.hist-section{display:none!important}
  body{padding-top:56px;background:white}
  .container{padding:0;max-width:100%}
  .invoice-wrap{border-radius:0;box-shadow:none}
  @page{margin:.5in}
}
@media(max-width:700px){
  .inv-billing{grid-template-columns:1fr}
  .bill-col{border-right:none;border-bottom:1px solid #e2e8f0}
  .inv-summary{grid-template-columns:repeat(2,1fr)}
  .remit-body{padding-top:56px;grid-template-columns:1fr}
  .inv-header{flex-direction:column;gap:16px}
  .inv-title{text-align:left}
}
.topnav{position:fixed;top:0;left:0;width:100vw;z-index:50;background:var(--card);border-bottom:1px solid var(--bdr);padding:0 20px}
.topnav-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px;position:relative}
.topnav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-weight:700;font-size:16px;white-space:nowrap}
.topnav-links{display:flex;gap:4px;align-items:center;overflow-x:auto;position:absolute;left:50%;transform:translateX(-50%)}
.topnav-links a{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--txt2);text-decoration:none;transition:all .2s;white-space:nowrap}
.topnav-links a:hover{color:var(--txt);background:var(--hover)}
.topnav-links a.active{color:white;background:var(--blue)}
.topnav-refresh{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:none;color:var(--txt2);cursor:pointer;transition:all .2s;white-space:nowrap}
.topnav-refresh:hover{border-color:var(--blue);color:var(--txt)}
html{overflow-y:scroll}body{overflow-x:hidden}
</style>

<script>
var INV_KEY='rac_invoices_v2';
var CO_KEY='rac_cos_v1';
var INVOICES=[];
var COS=[];
var LIVE=null;

function loadInvoices(){try{INVOICES=JSON.parse(localStorage.getItem(INV_KEY))||[];}catch(e){INVOICES=[];}}
function saveInvoices(){localStorage.setItem(INV_KEY,JSON.stringify(INVOICES));}
function loadCOs(){try{COS=JSON.parse(localStorage.getItem(CO_KEY))||[];}catch(e){COS=[];}}
function saveCOs(){localStorage.setItem(CO_KEY,JSON.stringify(COS));}

function showToast(msg,col){var t=document.getElementById('toast');t.textContent=msg;t.style.background=col||'var(--green)';t.className='toast show';setTimeout(function(){t.classList.remove('show');},2200);}
function money(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function safeEsc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return n<10?'0'+n:String(n);}
function invNumber(){var d=new Date();return 'INV-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());}
function fmtDate(s){if(!s)return '—';var d=new Date(s+'T12:00:00');return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
function dueDate(s){var d=new Date(s+'T12:00:00');d.setDate(d.getDate()+30);return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}

function switchTab(id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===id);});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='hist') renderInvHistory();
  if(id==='co') renderCOs();
  if(id==='inv') renderInvoice();
}

// ── LOAD SHEET ──
async function loadSheet(){
  document.getElementById('invoiceWrap').innerHTML='<div class="loading">⏳ Loading live data from sheet...</div>';
  document.getElementById('refreshNote').textContent='Loading...';
  try{
    var data=await loadProjectData();
    LIVE=data;
    document.getElementById('refreshNote').textContent='Live · '+new Date().toLocaleTimeString();
    renderInvoice();
  }catch(err){
    document.getElementById('invoiceWrap').innerHTML='<div class="loading" style="color:#ef4444">⚠️ '+safeEsc(err.message)+'</div>';
    document.getElementById('refreshNote').textContent='Error';
  }
}

// ── BUILD LINE ITEM DATA ──
function buildItems(){
  if(!LIVE) return [];
  var sections=[];
  LIVE.main.phases.forEach(function(phase){
    if(phase.name==='options'||phase.name==='contingency') return;
    var items=[];
    phase.items.forEach(function(item){
      if(!item.markup||item.markup<1) return;
      var key=phase.name+'|'+item.nameNorm;
      var pct=item.progress||0;
      if(pct<=0) return;
      var earned=item.markup*(pct/100);
      var prev=item.paid||0;
      var thisAmt=Math.max(0,earned-prev);

      items.push({key:key,name:item.name,vendor:item.vendor||'',markup:item.markup,pct:pct,earned:earned,prev:prev,thisAmt:thisAmt,billable:thisAmt>0.01});
    });
    if(items.length) sections.push({display:phase.display||phase.name,items:items});
  });
  // Add Change Orders section
  var sheetCOs=(LIVE&&LIVE.main&&LIVE.main.sheetCOs)||[];
  var coItems=[];
  sheetCOs.forEach(function(co){
    var pct=co.pct||0;
    if(pct<=0) return;
    var earned=co.amount*(pct/100);
    var prev=co.paid||0;
    var thisAmt=Math.max(0,earned-prev);
    coItems.push({key:co.num,name:co.num+' — '+co.desc,vendor:'',markup:co.amount,pct:pct,earned:earned,prev:prev,thisAmt:thisAmt,billable:thisAmt>0.01});
  });
  if(coItems.length) sections.unshift({display:'Change Orders',items:coItems});
  return sections;
}

function saveAndPrint(){
  if(!LIVE){showToast('Refresh first','var(--red)');return;}
  loadInvoices();

  sections.forEach(function(s){s.items.forEach(function(i){if(i.billable)lineItems.push({key:i.key,name:i.name,vendor:i.vendor,markup:i.markup,pct:i.pct,earned:i.earned,prev:i.prev,amount:i.thisAmt});});});
  if(!lineItems.length){showToast('Nothing new to invoice — all items paid','var(--yellow)');return;}
  var total=lineItems.reduce(function(s,i){return s+i.amount;},0);
  var baseNum=invNumber();

  showToast('✓ '+num+' saved');

// ── QUICKBOOKS IIF EXPORT ──
function exportQB(){
  if(!LIVE){showToast('Refresh sheet first','var(--red)');return;}
  loadInvoices();
  var sections=buildItems();
  var lineItems=[];
  sections.forEach(function(s){
    s.items.forEach(function(i){
      if(i.billable) lineItems.push(i);
    });
  });
  if(!lineItems.length){showToast('Nothing to export — no new earned amount','var(--yellow)');return;}

  var num=invNumber();
  var dateStr=todayStr();
  // QB date format MM/DD/YYYY
  var d=new Date(dateStr+'T12:00:00');
  var qbDate=pad(d.getMonth()+1)+'/'+pad(d.getDate())+'/'+d.getFullYear();
  var dueD=new Date(dateStr+'T12:00:00');
  dueD.setDate(dueD.getDate()+30);
  var qbDue=pad(dueD.getMonth()+1)+'/'+pad(dueD.getDate())+'/'+dueD.getFullYear();

  // IIF format — headers then transaction lines
  var lines=[];

  // Account header (needed once)
  lines.push('!ACCNT\tNAME\tACCNTTYPE');
  lines.push('ACCNT\tAccounts Receivable\tAR');
  lines.push('ACCNT\tConstruction Income\tINC');
  lines.push('');

  // Customer header
  lines.push('!CUST\tNAME\tBSTREET\tBCITY\tBSTATE\tBZIP');
  lines.push('CUST\tJessica & Adrian Rodriguez\t646 W Liberty Lane\tKanarraville\tUT\t84742');
  lines.push('');

  // Invoice header definition
  lines.push('!TRNS\tTRNSTYPE\tDATE\tACCNT\tNAME\tAMOUNT\tDOCNUM\tMEMO\tTERMS\tDUEDATE');
  lines.push('!SPL\tTRNSTYPE\tDATE\tACCNT\tNAME\tAMOUNT\tMEMO\tQNTY\tPRICE');
  lines.push('!ENDTRNS');
  lines.push('');

  var total=lineItems.reduce(function(s,i){return s+i.thisAmt;},0);

  // TRNS line — the invoice header
  lines.push(
    'TRNS\t'+'INVOICE\t'+
    qbDate+'\t'+
    'Accounts Receivable\t'+
    'Jessica & Adrian Rodriguez\t'+
    total.toFixed(2)+'\t'+
    num+'\t'+
    'Rodriguez Residence\t'+
    'Net 30\t'+
    qbDue
  );

  // SPL lines — one per line item
  lineItems.forEach(function(item){
    lines.push(
      'SPL\t'+'INVOICE\t'+
      qbDate+'\t'+
      'Construction Income\t'+
      safeEsc(item.name).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')+'\t'+
      (-item.thisAmt).toFixed(2)+'\t'+
      item.pct.toFixed(0)+'% Complete - '+item.name+(item.vendor?' ('+item.vendor+')':'')+'\t'+
      '1\t'+
      item.thisAmt.toFixed(2)
    );
  });

  lines.push('ENDTRNS');
  lines.push('');

  var iif=lines.join('\r\n');
  var blob=new Blob([iif],{type:'text/plain'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=num+'.iif';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ '+num+'.iif downloaded — import via QB File → Import → IIF');
}

    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[userMsg]})
  }).then(function(r){return r.json();}).then(function(data){
    var txt='';
    (data.content||[]).forEach(function(b){if(b.type==='text')txt+=b.text;});
    var clean=txt.replace(/```json|```/g,'').trim();
    var co=JSON.parse(clean);
    openCOModal(co);
    showToast('\u2713 Parsed \u2014 review and save');
  }).catch(function(err){
    console.error(err);
    showToast('\u2717 Parse failed \u2014 check console');
    openCOModal();
  });
}
function openCOModal(pre){
  pre=pre||{};
  document.getElementById('modalWrap').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<h3>'+(pre.name?'🤖 Review Parsed CO':'Add Change Order')+'</h3>'+
    (pre.name?'<div style="font-size:11px;color:var(--dim);margin-bottom:12px">Fields pre-filled from uploaded doc. Review and save.</div>':'')+
    '<label>CO Name</label><input id="mName" placeholder="e.g. CO-002 Camera Addition" value="'+(pre.name||'')+'">'+
    '<div class="modal-row"><div><label>Vendor</label><input id="mVendor" value="'+(pre.vendor||'')+'"></div><div><label>Amount ($)</label><input type="number" step="0.01" id="mAmt" value="'+(pre.amount||'')+'"></div></div>'+
    '<div class="modal-row"><div><label>Date</label><input type="date" id="mDate" value="'+(pre.date||todayStr())+'"></div><div><label>Status</label><select id="mSt"><option value="pending"'+((!pre.status||pre.status==="pending")?" selected":"")+'>Pending</option><option value="approved"'+(pre.status==="approved"?" selected":"")+'>Approved</option><option value="rejected"'+(pre.status==="rejected"?" selected":"")+'>Rejected</option></select></div></div>'+
    '<label>Notes</label><textarea id="mDesc" placeholder="Optional...">'+(pre.description||'')+'</textarea>'+
    '<div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveCO()">Save</button></div>'+
  '</div></div>';
}
function saveCO(){
  var co={name:document.getElementById('mName').value,vendor:document.getElementById('mVendor').value,amount:document.getElementById('mAmt').value,date:document.getElementById('mDate').value,description:document.getElementById('mDesc').value,status:document.getElementById('mSt').value};
  loadCOs();COS.push(co);saveCOs();closeModal();renderCOs();showToast('✓ Saved');
}
function deleteCO(idx){loadCOs();if(!confirm('Delete?'))return;COS.splice(idx,1);saveCOs();renderCOs();showToast('✓ Deleted');}
function closeModal(){document.getElementById('modalWrap').innerHTML='';}

// ── MIGRATE OLD DATA (rodriguez_docs_v1 → rac_cos_v1) ──
(function migrate(){
  try{
    var old=JSON.parse(localStorage.getItem('rodriguez_docs_v1')||'[]');
    if(!old.length) return;
    loadCOs();
    var existingKeys=COS.map(function(c){return c.name+c.date;});
    var added=0;
    old.forEach(function(doc){
      if(doc.type==='co'){
        var k=(doc.name||'')+(doc.date||'');
        if(existingKeys.indexOf(k)===-1){
          COS.push({name:doc.name,vendor:doc.vendor,amount:doc.amount,date:doc.date,description:doc.description,status:doc.status||'pending'});
          added++;
        }
      }
    });
    if(added){saveCOs();console.log('Migrated '+added+' change order(s) from old store');}
  }catch(e){}
})();

// ── INIT ──
loadSheet();
</script>
