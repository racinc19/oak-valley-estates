function requestApproval(type, id){
  _pinTarget=id; _pinType=type;
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').textContent='';
  document.getElementById('modalPin').classList.add('open');
  setTimeout(()=>document.getElementById('pinInput').focus(),100);
}
function submitPin(){
  const entered=document.getElementById('pinInput').value;
  if(entered!==OWNER_PIN){
    document.getElementById('pinError').textContent='Incorrect PIN. Try again.';
    document.getElementById('pinInput').value='';
    return;
  }
  const now=new Date();
  const stamp=now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const approval={approved:true,stamp,by:'Owner'};
  if(_pinType==='finish'){
    for(const r of DATA){const f=r.finishes.find(x=>x.id===_pinTarget);if(f){f.ownerApproval=approval;break;}}
  } else {
    const i=findItem(_pinTarget);if(i)i.ownerApproval=approval;
  }
  saveData();
  closeModal('modalPin');
  render();
  showToast('✓ Owner Approved');
}
function revokeApproval(type,id){
  if(!confirm('Revoke owner approval?'))return;
  if(type==='finish'){for(const r of DATA){const f=r.finishes.find(x=>x.id===id);if(f){delete f.ownerApproval;break;}}}
  else {const i=findItem(id);if(i)delete i.ownerApproval;}
  saveData();render();showToast('Approval revoked');
}
// ── IndexedDB for photos ──────────────────────────────────────────────────
let photoDB=null;
function openPhotoDB(){
  return new Promise((res,rej)=>{
    if(photoDB)return res(photoDB);
    const req=indexedDB.open('sel_photos',1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore('photos',{keyPath:'id'})};
    req.onsuccess=e=>{photoDB=e.target.result;res(photoDB)};
    req.onerror=e=>rej(e);
  });
}
function savePhoto(id,dataUrl){
  return openPhotoDB().then(db=>{
    return new Promise((res,rej)=>{
      const tx=db.transaction('photos','readwrite');
      tx.objectStore('photos').put({id,dataUrl});
      tx.oncomplete=()=>res();
      tx.onerror=e=>rej(e);
    });
  });
}
function loadPhoto(id){
  return openPhotoDB().then(db=>{
    return new Promise((res,rej)=>{
      const tx=db.transaction('photos','readonly');
      const req=tx.objectStore('photos').get(id);
      req.onsuccess=e=>res(e.target.result?e.target.result.dataUrl:null);
      req.onerror=e=>rej(e);
    });
  });
}
function loadAllPhotos(){
  return openPhotoDB().then(db=>{
    return new Promise((res,rej)=>{
      const tx=db.transaction('photos','readonly');
      const req=tx.objectStore('photos').getAll();
      req.onsuccess=e=>{const map={};e.target.result.forEach(p=>map[p.id]=p.dataUrl);res(map)};
      req.onerror=e=>rej(e);
    });
  });
}

  DATA=JSON.parse(JSON.stringify(SEED_ROOMS));

function getFinishByMaterial(type, material){
  const mat=material.trim().toLowerCase();
  for(const r of DATA)
    for(const f of r.finishes)
      if(f.type===type && f.material && f.material.trim().toLowerCase()===mat && (f.link||f.photo))
        return f;
  return null;
}
function getMaterialOptions(type){
  const seen=new Set();
  for(const r of DATA)
    for(const f of r.finishes)
      if(f.type===type&&f.material&&f.material.trim())seen.add(f.material.trim());
  return [...seen].sort();
}

  const r=findRoom(roomId);if(!r)return;
  const f=r.finishes.find(x=>x.id===fid);if(!f)return;

  if(src.link&&!f.link){f.link=src.link;changed=true;}
  if(src.photo&&!f.photo){f.photo=src.photo;changed=true;}
  if(changed){saveData();render();showToast('✓ URL & photo copied');}
}

function handleFinishPhoto(id,input){
  const f2=input.files[0];if(!f2)return;
  const rd=new FileReader();
  rd.onload=e=>{
    const dataUrl=e.target.result;
    for(const room of DATA){
      const fi=room.finishes.find(x=>x.id===id);
      if(fi){fi.photo=dataUrl;saveData();render();break;}
    }
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'saveSelPhoto',id,photo:dataUrl})})
      .then(r=>r.json()).then(d=>{
        if(d.url){for(const room of DATA){const fi=room.finishes.find(x=>x.id===id);if(fi){fi.photo=d.url;saveData();render();break;}}}
      }).catch(err=>console.warn('Drive finish photo err',err));
  };
  rd.readAsDataURL(f2);
}
function handlePhoto(id,input){
  const f=input.files[0];if(!f)return;
  const r2=new FileReader();
  r2.onload=e=>{
    const dataUrl=e.target.result;
    const i=findItem(id);
    if(i){i.photo=dataUrl;saveData();render();}
    // Save to Drive in background
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'saveSelPhoto',id,photo:dataUrl})})
      .then(r=>r.json()).then(d=>{
        if(d.url&&i){i.photo=d.url;saveData();render();}
      }).catch(err=>console.warn('Drive photo save err',err));
  };
  r2.readAsDataURL(f);
}

}

(function migrate(){
  let dirty=false;
  // Remove rooms no longer in scope
  const REMOVE=new Set(['guest_suite','pw_doors','pw_windows','pw_paint','pw_roofing','bed3','adu_bath2','adu_laundry','pw_electrical','pw_plumbing','upper_bath']);
  for(let i=DATA.length-1;i>=0;i--){if(REMOVE.has(DATA[i].id)){DATA.splice(i,1);dirty=true;}}
  // Rename bed2 → adu_bedroom
  const _b2=DATA.find(r=>r.id==='bed2');
  if(_b2){_b2.id='adu_bedroom';_b2.name='ADU Bedroom';_b2.level='ADU / Casita';dirty=true;}
  // Ensure adu_bedroom is grouped with ADU (move after adu_bath1)
  const _aduBed=DATA.find(r=>r.id==='adu_bedroom');
  const _aduBath1=DATA.findIndex(r=>r.id==='adu_bath1');
  const _aduBedIdx=DATA.findIndex(r=>r.id==='adu_bedroom');
  if(_aduBed&&_aduBath1!==-1&&_aduBedIdx<_aduBath1-1){
    DATA.splice(_aduBedIdx,1);
    DATA.splice(DATA.findIndex(r=>r.id==='adu_bath1')+1,0,_aduBed);
    dirty=true;
  }
  // Add Panic Room if missing
  if(!DATA.find(r=>r.id==='panic_room')){
    const _grIdx=DATA.findIndex(r=>r.id==='gun_range');
    const _pr={level:'Basement',id:'panic_room',name:'Panic Room',automationInterface:'',
      finishes:[
        {id:'f'+Math.random().toString(36).slice(2,9),type:'Floor',material:'TBD',qty:'',unit:'SF',vendor:'TBD',link:'',notes:'',status:'not_started',model:'',color:'',leadTime:'',photo:''},
        {id:'f'+Math.random().toString(36).slice(2,9),type:'Door',material:'TBD',qty:'1',unit:'EA',vendor:'TBD',link:'',notes:'Ballistic rated vault-style door',status:'not_started',model:'',color:'',leadTime:'',photo:''},
        {id:'f'+Math.random().toString(36).slice(2,9),type:'Wall',material:'TBD',qty:'',unit:'',vendor:'TBD',link:'',notes:'',status:'not_started',model:'',color:'',leadTime:'',photo:''},
        {id:'f'+Math.random().toString(36).slice(2,9),type:'Ceiling',material:'TBD',qty:'',unit:'',vendor:'TBD',link:'',notes:'',status:'not_started',model:'',color:'',leadTime:'',photo:''}
      ],items:[]};
    if(_grIdx!==-1)DATA.splice(_grIdx+1,0,_pr);else DATA.push(_pr);
    dirty=true;
  }
  // Add Office Closet if missing
  if(!DATA.find(r=>r.id==='office_closet')){
    const _obi=DATA.findIndex(r=>r.id==='office_bath');
    const _oc={level:'Main Level',id:'office_closet',name:'Office Closet',automationInterface:'',lightingType:'',lightingPhoto:'',
      finishes:[{id:'f'+Math.random().toString(36).slice(2,9),type:'Floor',material:'TBD',qty:'',unit:'SF',vendor:'TBD',link:'',notes:'',status:'not_started',model:'',color:'',leadTime:'',photo:''},
               {id:'f'+Math.random().toString(36).slice(2,9),type:'Door',material:'TruStile TMF2200 MDF',qty:'1',unit:'EA',vendor:'TruStile / Sunpro',link:'',notes:'',status:'not_started',model:'TMF2200',color:'Primed',leadTime:'7-8 wks',photo:''}],items:[]};
    if(_obi!==-1)DATA.splice(_obi,0,_oc);else DATA.push(_oc);
    dirty=true;
  }
  // Split Thermador combined item
  for(const r of DATA){
    const _ti=r.items.findIndex(it=>it.name==='Thermador Fridge + Freezer Columns');
    if(_ti!==-1){
      const _orig=r.items[_ti];
      r.items.splice(_ti,1,
        {..._orig,id:'i'+Math.random().toString(36).slice(2,9),name:'Thermador Refrigerator Column',model:'T36IR905SP',link:'https://www.thermador.com/us/products/refrigeration/freedom-columns/t36ir905sp',notes:'T36IR905SP. 36" Panel Ready refrigerator column.'},
        {..._orig,id:'i'+Math.random().toString(36).slice(2,9),name:'Thermador Freezer Column',model:'T36IF905SP',link:'https://www.thermador.com/us/products/refrigeration/freedom-columns/t36if905sp',notes:'T36IF905SP. 36" Panel Ready freezer column. Internal ice.'}
      );
      dirty=true;
    }
  }
  // Remove Display/Sound from rooms that shouldn't have them; add to rooms that should
  const _keepDS=new Set(['outdoor_bbq','office','great_room','primary_suite','primary_bath','adu_bedroom','basement_living']);
  for(const r of DATA){
    if(!_keepDS.has(r.id)){
      const before=r.items.length;
      r.items=r.items.filter(it=>it.name!=='Display'&&it.name!=='Sound');
      if(r.items.length!==before)dirty=true;
    } else {
      if(!r.items.find(it=>it.name==='Display')){r.items.push({id:'i'+Math.random().toString(36).slice(2,9),name:'Display',vendor:'TBD',link:'',manual:'',notes:'',status:'not_started',model:'',color:'',leadTime:'',photo:''});dirty=true;}
      if(!r.items.find(it=>it.name==='Sound')){r.items.push({id:'i'+Math.random().toString(36).slice(2,9),name:'Sound',vendor:'TBD',link:'',manual:'',notes:'',status:'not_started',model:'',color:'',leadTime:'',photo:''});dirty=true;}
    }
  }
  if(dirty){saveData();render();}
})();

function copyFinishToRooms(roomId, finishId){
  const srcRoom=DATA.find(r=>r.id===roomId);
  if(!srcRoom)return;
  const srcFinish=srcRoom.finishes.find(f=>f.id===finishId);
  if(!srcFinish)return;
  const type=srcFinish.type;
  const fields=['material','qty','vendor','link','notes','model','color','leadTime'];
  let count=0;
  for(const r of DATA){
    if(r.id===roomId)continue;
    const target=r.finishes.find(f=>f.type===type);
    if(target){
      fields.forEach(k=>{if(srcFinish[k])target[k]=srcFinish[k];});
      count++;
    }
  }
  saveData();render();
  showToast(`Copied ${type} to ${count} room${count!==1?'s':''}`);
}
